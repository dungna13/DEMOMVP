name: Auto-Bot CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f auto_bot/requirements.txt ]; then pip install -r auto_bot/requirements.txt; fi

    - name: Test Main Entry Point
      run: |
        # Set python path to root so it can find auto_bot package
        export PYTHONPATH=$PYTHONPATH:.
        # Create dummy env if needed (not needed for simple main)
        # Run main.py (It connects to Telegram, so might fail if no token? No, code handles it)
        python auto_bot/main.py
