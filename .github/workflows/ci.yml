name: Auto-Bot CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f auto_bot/requirements.txt ]; then pip install -r auto_bot/requirements.txt; fi

    - name: Syntax Check Only
      run: |
        # Set python path to root
        export PYTHONPATH=$PYTHONPATH:.
        # Check if modules can be imported (verifies no syntax errors / missing imports)
        python -c "import auto_bot.main; print('Successfully imported auto_bot.main')"
