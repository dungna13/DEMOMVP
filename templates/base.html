<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống Tìm kiếm Văn bản Hành chính Quốc gia — Tra cứu pháp luật, hỏi đáp AI, Knowledge Wiki." />
  <title>{% block title %}Tìm kiếm Văn bản Hành chính{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v=2" />
  <link rel="stylesheet" href="/static/phase2.css?v=2" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="brand-icon">⚖</div>
    <div>
      <div class="brand-title">Văn bản Hành chính</div>
      <div class="brand-subtitle">Cơ sở dữ liệu</div>
    </div>
  </a>
  <div class="navbar-links">
    <a href="/" class="{% if request.url.path == '/' or request.url.path == '/search' %}active{% endif %}">🔍 Tìm kiếm</a>
    <a href="/qa" class="{% if request.url.path == '/qa' %}active{% endif %}">💬 Hỏi đáp AI</a>
    <a href="/wiki" class="{% if request.url.path.startswith('/wiki') %}active{% endif %}">📖 Knowledge Wiki</a>
    <a href="/upload" class="{% if request.url.path == '/upload' %}active{% endif %}">📤 Upload văn bản</a>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- FOOTER -->
<footer class="footer">
  <p>Hệ thống Tìm kiếm Văn bản Hành chính Quốc gia</p>
</footer>

<script src="/static/app.js?v=2"></script>
</body>
</html>
