<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống Tìm kiếm Văn bản Hành chính Quốc gia — Tra cứu pháp luật, hỏi đáp AI, tìm kiếm thông minh." />
  <title>{% block title %}Tìm kiếm Văn bản Hành chính{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/phase2.css" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="brand-icon">⚖</div>
    <div>
      <div class="brand-title">Văn bản Hành chính</div>
      <div class="brand-subtitle">Quốc gia · Phase 2</div>
    </div>
  </a>
  <div class="navbar-links">
    <a href="/" class="{% if request.url.path == '/' or request.url.path == '/search' %}active{% endif %}">🔍 Tìm kiếm</a>
    <a href="/qa" class="{% if request.url.path == '/qa' %}active{% endif %}">💬 Hỏi đáp AI</a>
    <a href="/api/documents" target="_blank">📋 Danh sách</a>
    <a href="/docs" target="_blank" class="api-badge">API Docs</a>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- FOOTER -->
<footer class="footer">
  <p>
    Hệ thống Tìm kiếm Văn bản Hành chính Quốc gia · Phase 2 — Hybrid Search + RAG ·
    <a href="/docs" target="_blank">REST API</a> ·
    <a href="/api/system-status" target="_blank">System Status</a>
  </p>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
